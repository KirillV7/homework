<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Доработка формы</title>
    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form class="form">
      <fieldset class="form-group">
        <legend class="title">Ваши личные данные</legend>
        <label class="label" for="name">Ваше имя</label>
        <input
          class="input"
          id="name"
          type="text"
          name="name"
          placeholder="Имя"
          required
        />
        <label class="label" for="age">Ваш возраст</label>
        <input
          class="input"
          id="age"
          type="namber"
          name="age"
          placeholder="Возраст"
          required
        />
        <label class="label" for="phone">Ваш номер телефона</label>
        <input
          disabled
          class="input"
          id="phone"
          type="tel"
          name="phone"
          placeholder="Номер телефона"
          inputmode="numeric"
          required
        />
        <label class="label" for="email">Ваша почта</label>
        <input
          class="input"
          id="email"
          type="email"
          name="email"
          placeholder="Почта"
          required
        />
      </fieldset>
      <fieldset class="form-group">
        <label class="label" for="massege">Сообщение</label>
        <textarea
          disabled
          class="textarea"
          name="maseege"
          id="massege"
          placeholder="Ваше сообщение"
          required
        ></textarea>
        <label class="label-checkbox" for="checkbox">
          <input
            class="input-checkbox"
            type="checkbox"
            name="checkbox"
            id="checkbox"
          />
          Я принмаю правила
        </label>
      </fieldset>
      <button class="button">Отправить</button>
    </form>
  </body>
</html>
