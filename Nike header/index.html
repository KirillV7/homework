<!doctype html>
<html class="page" lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/index.css" />
    <link
      rel="shortcut icon"
      href="./icons/Nike.ico.svg-48x48.svg"
      type="images/x-icon"
    />
    <script defer type="module" src="./js/index.js"></script>
    <title>Nike Air Mag</title>
  </head>
  <body class="page__body">
    <header class="header">
      <div class="container header__container">
        <a class="logo header__logo" href="/">
          <img
            class="logo__img"
            src="./icons/Logo__Nike.svg"
            alt="Логотип сайта Nike"
          />
        </a>
        <nav
          class="menu header__menu"
          id="header__menu"
          aria-label="Главное меню"
        >
          <ul class="list menu__list">
            <li class="item menu__item">
              <a class="link menu__link" href="#air-mag" lang="en"> Air Mag </a>
            </li>
            <li class="item menu__item">
              <a class="link menu__link" href="#sizes"> Размеры </a>
            </li>
            <li class="item menu__item">
              <a class="link menu__link" href="#characteristics">
                Характеристики
              </a>
            </li>
            <li class="item menu__item">
              <a class="link menu__link" href="#top-models">
                Другие ТОП модели
              </a>
            </li>
          </ul>
        </nav>
        <div class="header__controls">
          <a class="header__order" href="#">Сделать заказ</a>
          <div class="header__actions">
            <button
              class="header__actions-button"
              title="Поиск"
              aria-label="Поиск"
            >
              <svg width="24" height="24">
                <use
                  class="header__actions-icon"
                  href="./icons/sprite.svg#search"
                ></use>
              </svg>
            </button>
            <button
              class="header__actions-button"
              title="Корзина"
              aria-label="Корзина"
            >
              <svg width="24" height="24">
                <use
                  class="header__actions-icon"
                  href="./icons/sprite.svg#basket"
                ></use>
              </svg>
            </button>
            <button
              class="header__burger burger burger--open"
              aria-label="Открыть меню"
              aria-expanded="false"
              aria-controls="header__menu"
            >
              <svg width="24" height="24">
                <use
                  class="burger__icon-menu"
                  href="./icons/sprite-menu.svg#burger"
                ></use>
                <use
                  class="burger__icon-cross"
                  href="./icons/sprite-menu.svg#cross"
                ></use>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
